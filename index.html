<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>바론네트웍스 통합 관리 시스템</title>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root{
  --navy:#0f3460;--navy2:#1a4a7a;--navy3:#e8eef8;
  --teal:#1d9e75;--teal2:#eaf7f2;
  --red:#c0392b;--red2:#fdeaea;
  --amber:#e67e22;--amber2:#fef6ec;
  --blue:#2980b9;--blue2:#eaf4fb;
  --gray:#6b7194;--gray2:#f5f6fa;--gray3:#e4e7f0;
  --surface:#fff;--border:#e0e4ef;--text:#1a1f36;--text2:#6b7194;
  --shadow:0 2px 8px rgba(15,52,96,.08);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Apple SD Gothic Neo','Pretendard',sans-serif;background:var(--gray2);color:var(--text);font-size:14px;line-height:1.5}
a{color:inherit;text-decoration:none}
button{cursor:pointer;font-family:inherit;font-size:14px}
input,select,textarea{font-family:inherit;font-size:14px}

/* ── LAYOUT ── */
#app{min-height:100vh}
.app-shell{display:flex;flex-direction:column;min-height:100vh}

/* ── HEADER ── */
.header{background:var(--navy);color:#fff;display:flex;align-items:center;justify-content:space-between;padding:0 24px;height:56px;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.2)}
.header-logo{display:flex;align-items:center;gap:10px}
.logo-mark{width:32px;height:32px;background:var(--teal);border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:15px}
.logo-text{font-size:15px;font-weight:600;letter-spacing:-.3px}
.logo-sub{font-size:11px;opacity:.6;margin-top:1px}
.header-nav{display:flex;gap:4px}
.nav-item{padding:6px 16px;border-radius:6px;color:rgba(255,255,255,.7);border:none;background:none;transition:all .15s;font-size:13px;font-weight:500}
.nav-item:hover{background:rgba(255,255,255,.1);color:#fff}
.nav-item.active{background:rgba(255,255,255,.15);color:#fff}
.header-user{display:flex;align-items:center;gap:10px;font-size:13px;opacity:.9}
.user-badge{background:rgba(255,255,255,.15);padding:3px 10px;border-radius:12px;font-size:12px}
.btn-logout{padding:5px 12px;border:1px solid rgba(255,255,255,.3);border-radius:6px;background:none;color:rgba(255,255,255,.8);font-size:12px}
.btn-logout:hover{background:rgba(255,255,255,.1)}

/* ── CONTENT ── */
.content{flex:1;padding:24px;max-width:1280px;margin:0 auto;width:100%}

/* ── FILTER BAR ── */
.filter-bar{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px 20px;margin-bottom:20px;box-shadow:var(--shadow)}
.filter-row{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.filter-group{display:flex;align-items:center;gap:8px}
.filter-label{font-size:12px;font-weight:600;color:var(--text2);white-space:nowrap;text-transform:uppercase;letter-spacing:.04em}
.filter-divider{width:1px;height:24px;background:var(--border);margin:0 4px}
.filter-type-btn{padding:5px 12px;border:1px solid var(--border);border-radius:6px;background:var(--gray2);color:var(--text2);font-size:12px;font-weight:500;transition:all .15s}
.filter-type-btn.active{background:var(--navy);color:#fff;border-color:var(--navy)}
select.f-select{padding:6px 10px;border:1px solid var(--border);border-radius:6px;background:var(--surface);color:var(--text);min-width:80px}
select.f-select:focus{outline:none;border-color:var(--navy);box-shadow:0 0 0 2px rgba(15,52,96,.12)}

/* ── TABS ── */
.tab-bar{display:flex;gap:4px;background:var(--gray2);border:1px solid var(--border);border-radius:10px;padding:4px;margin-bottom:20px;width:fit-content}
.tab-btn{padding:8px 20px;border-radius:7px;border:none;background:none;color:var(--text2);font-weight:500;font-size:13px;transition:all .15s}
.tab-btn.active{background:var(--surface);color:var(--navy);box-shadow:0 1px 4px rgba(0,0,0,.1)}

/* ── STATS GRID ── */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;margin-bottom:20px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px 18px;box-shadow:var(--shadow)}
.stat-card.blue{border-left:3px solid var(--blue)}
.stat-card.green{border-left:3px solid var(--teal)}
.stat-card.red{border-left:3px solid var(--red)}
.stat-card.amber{border-left:3px solid var(--amber)}
.stat-card.navy{border-left:3px solid var(--navy)}
.stat-lbl{font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.04em;margin-bottom:6px}
.stat-val{font-size:28px;font-weight:700;color:var(--text);line-height:1}
.stat-sub{font-size:12px;color:var(--text2);margin-top:4px}
.stat-note{font-size:11px;color:var(--text2);margin-top:2px}

/* ── TOGGLE STRIP ── */
.toggle-strip{display:flex;align-items:center;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.toggle-label{font-size:12px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.04em}
.toggle-group{display:flex;gap:0;border:1px solid var(--border);border-radius:6px;overflow:hidden}
.toggle-btn{padding:5px 12px;border:none;background:var(--gray2);color:var(--text2);font-size:12px;font-weight:500;transition:all .15s;border-right:1px solid var(--border)}
.toggle-btn:last-child{border-right:none}
.toggle-btn.active{background:var(--navy);color:#fff}

/* ── CHARTS ── */
.charts-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(400px,1fr));gap:16px;margin-bottom:20px}
.chart-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px;box-shadow:var(--shadow)}
.chart-card.full{grid-column:1/-1}
.chart-title{font-size:13px;font-weight:600;color:var(--text2);margin-bottom:14px;text-transform:uppercase;letter-spacing:.04em}
.chart-wrap{position:relative;width:100%;height:260px}

/* ── TABLE ── */
.table-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;box-shadow:var(--shadow);margin-bottom:20px}
.table-card-header{padding:14px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.table-card-title{font-size:13px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.04em}
.data-table{width:100%;border-collapse:collapse;font-size:13px}
.data-table thead th{padding:10px 12px;text-align:left;font-size:11px;font-weight:600;color:var(--text2);background:var(--gray2);border-bottom:1px solid var(--border);white-space:nowrap;text-transform:uppercase;letter-spacing:.04em}
.data-table thead th.num{text-align:right}
.data-table tbody td{padding:10px 12px;border-bottom:1px solid var(--gray3);color:var(--text)}
.data-table tbody td.num{text-align:right;font-variant-numeric:tabular-nums}
.data-table tbody tr:last-child td{border-bottom:none}
.data-table tbody tr:hover td{background:var(--gray2)}
.data-table tfoot td{padding:10px 12px;font-weight:700;background:var(--gray2);border-top:2px solid var(--border);color:var(--navy)}
.data-table tfoot td.num{text-align:right}
.pill{display:inline-flex;align-items:center;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600}
.pill.up{background:var(--teal2);color:var(--teal)}
.pill.dn{background:var(--red2);color:var(--red)}
.pill.neu{background:var(--gray3);color:var(--gray)}
.pill.blue{background:var(--blue2);color:var(--blue)}
.rate-badge{font-variant-numeric:tabular-nums}

/* ── LOGIN ── */
.login-page{min-height:100vh;display:flex;align-items:center;justify-content:center;background:#f5f0e8}
.login-box{background:#fff;border-radius:20px;padding:48px 44px;width:400px;box-shadow:0 8px 40px rgba(0,0,0,.08)}
.login-logo{text-align:center;margin-bottom:28px}
.login-logo .shield{width:80px;height:80px;margin:0 auto 16px;position:relative}
.login-logo .shield svg{width:80px;height:80px}
.login-logo .title{font-size:20px;font-weight:700;color:#1a1f36;line-height:1.3}
.login-logo .sub{font-size:12px;color:#6b7194;margin-top:6px;letter-spacing:.02em}
.form-group{margin-bottom:16px}
.form-group label{display:block;font-size:12px;font-weight:600;color:var(--text2);margin-bottom:6px;text-transform:uppercase;letter-spacing:.04em}
.form-control{width:100%;padding:10px 14px;border:1px solid var(--border);border-radius:8px;background:var(--surface);color:var(--text);transition:border-color .15s}
.form-control:focus{outline:none;border-color:var(--navy);box-shadow:0 0 0 3px rgba(15,52,96,.1)}
.btn{padding:10px 20px;border-radius:8px;border:1px solid var(--border);font-weight:600;transition:all .15s;display:inline-flex;align-items:center;gap:6px}
.btn-primary{background:var(--navy);color:#fff;border-color:var(--navy);width:100%;justify-content:center}
.btn-primary:hover{background:var(--navy2)}
.btn-secondary{background:var(--surface);color:var(--text)}
.btn-secondary:hover{background:var(--gray2)}
.btn-danger{background:var(--red2);color:var(--red);border-color:#f5c6c4}
.btn-danger:hover{background:#fbd5d3}
.btn-success{background:var(--teal2);color:var(--teal);border-color:#b8e8d9}
.btn-success:hover{background:#d4f0e8}
.btn-sm{padding:5px 12px;font-size:12px;border-radius:6px}
.error-msg{background:var(--red2);color:var(--red);padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:14px;display:none}

/* ── FORMS ── */
.form-section{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px 24px;margin-bottom:16px;box-shadow:var(--shadow)}
.form-section-title{font-size:13px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.04em;margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid var(--border)}
.form-row{display:flex;gap:12px;align-items:center;margin-bottom:14px;flex-wrap:wrap}
.form-row label{font-size:12px;font-weight:600;color:var(--text2);min-width:80px}
.input-sm{padding:7px 12px;border:1px solid var(--border);border-radius:7px;background:var(--surface);color:var(--text);width:100px}
.input-sm:focus{outline:none;border-color:var(--navy)}
.input-xs{width:70px;padding:5px 8px;border:1px solid var(--border);border-radius:5px;background:var(--surface);color:var(--text);text-align:center}
.input-xs:focus{outline:none;border-color:var(--navy)}
.grade-entry-table{width:100%;border-collapse:collapse;font-size:13px;min-width:720px}
.grade-entry-table th{padding:8px 8px;font-size:11px;font-weight:600;color:var(--text2);background:var(--gray2);border-bottom:1px solid var(--border);text-align:center;text-transform:uppercase;letter-spacing:.04em}
.grade-entry-table th:first-child{text-align:left;padding-left:12px}
.grade-entry-table td{padding:6px 6px;border-bottom:1px solid var(--gray3);text-align:center}
.grade-entry-table td:first-child{text-align:left;padding-left:12px;font-weight:600;color:var(--navy)}
.grade-entry-table td.calc{background:var(--navy3);font-weight:700;color:var(--navy)}
.grade-entry-table tfoot td{padding:8px 8px;background:var(--gray2);font-weight:700;border-top:2px solid var(--border);text-align:center;color:var(--navy)}
.grade-entry-table tfoot td:first-child{text-align:left;padding-left:12px}
.form-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:16px}
.upload-zone{border:2px dashed var(--border);border-radius:12px;padding:32px;text-align:center;cursor:pointer;transition:all .2s;background:var(--gray2);margin-bottom:16px}
.upload-zone:hover,.upload-zone.drag-over{border-color:var(--navy);background:var(--navy3)}
.upload-zone .icon{font-size:32px;margin-bottom:8px}
.upload-zone p{font-size:13px;color:var(--text2)}
.upload-zone strong{color:var(--navy)}
.upload-zone input[type=file]{display:none}
.upload-result{background:var(--teal2);border:1px solid #b8e8d9;border-radius:10px;padding:14px 18px;margin-bottom:16px;display:flex;align-items:center;gap:12px}
.upload-result .icon{font-size:20px}
.upload-result .info{flex:1}
.upload-result .info strong{display:block;font-size:13px;color:var(--teal)}
.upload-result .info span{font-size:12px;color:var(--text2)}
.upload-err{background:var(--red2);border:1px solid #f5c6c4;border-radius:10px;padding:14px 18px;margin-bottom:16px;font-size:13px;color:var(--red)}
.divider-or{display:flex;align-items:center;gap:10px;margin:16px 0;color:var(--text2);font-size:12px}
.divider-or::before,.divider-or::after{content:'';flex:1;height:1px;background:var(--border)}

/* ── ADMIN ── */
.admin-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
.user-table-row .actions{display:flex;gap:6px;opacity:0;transition:opacity .15s}
.user-table-row:hover .actions{opacity:1}
.campus-tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.campus-tag{display:inline-flex;align-items:center;gap:6px;padding:4px 10px;background:var(--navy3);color:var(--navy);border-radius:14px;font-size:12px;font-weight:500}
.campus-tag .remove-tag{background:none;border:none;color:var(--text2);line-height:1;padding:0 2px;font-size:14px;cursor:pointer}
.campus-tag .remove-tag:hover{color:var(--red)}
.add-row{display:flex;gap:8px;margin-top:10px}

/* ── SETUP ── */
.setup-page{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--navy)}
.setup-box{background:var(--surface);border-radius:16px;padding:40px;width:460px;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.setup-step{margin-bottom:20px;padding:16px;background:var(--gray2);border-radius:10px;border:1px solid var(--border)}

/* ── EMPTY STATE ── */
.empty-state{text-align:center;padding:60px 20px;color:var(--text2)}
.empty-state .icon{font-size:40px;margin-bottom:12px;opacity:.5}
.empty-state p{font-size:14px}

/* ── MISC ── */
.page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.page-title{font-size:20px;font-weight:700;color:var(--text)}
.page-sub{font-size:13px;color:var(--text2);margin-top:2px}
.alert{padding:10px 16px;border-radius:8px;font-size:13px;margin-bottom:12px}
.alert-success{background:var(--teal2);color:var(--teal)}
.alert-error{background:var(--red2);color:var(--red)}
.alert-info{background:var(--blue2);color:var(--blue)}
.spinner{display:inline-block;width:20px;height:20px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-page{min-height:100vh;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:12px;background:var(--gray2);color:var(--text2)}
.badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600}
.badge-admin{background:#fff3cd;color:#856404}
.badge-user{background:var(--blue2);color:var(--blue)}
@media(max-width:768px){
  .stats-grid{grid-template-columns:1fr 1fr}
  .charts-grid{grid-template-columns:1fr}
  .admin-grid{grid-template-columns:1fr}
  .content{padding:12px}
  .header-nav{display:none}
}
</style>
</head>

<div id="app"><div class="loading-page"><div class="spinner" style="border-top-color:var(--navy);border-color:var(--border);width:28px;height:28px;border-width:3px"></div><p>로딩 중...</p></div></div>

<script>
// ================================================================

// ================================================================
const FIREBASE_CONFIG = {

  projectId: "varon-accounts",

  messagingSenderId: "285378160282",
  appId: "1:285378160282:web:0646596888d89dcafce123",
  measurementId: "G-C54RKFVYSD"
};

// ================================================================
// CONSTANTS
// ================================================================
const GRADES = ['초1','초2','초3','초4','초5','초6','중1','중2','중3'];
const SEASONS = {winter:'겨울(12~2월)',spring:'봄(3~5월)',summer:'여름(6~8월)',fall:'가을(9~11월)'};
const SEASON_MONTHS = {
  winter:[12,1,2], spring:[3,4,5], summer:[6,7,8], fall:[9,10,11]
};
const CY = new Date().getFullYear(), CM = new Date().getMonth()+1;
const CHART_COLORS = ['#0f3460','#1d9e75','#e67e22','#c0392b','#2980b9','#8e44ad','#16a085','#d35400'];

// ================================================================
// STATE
// ================================================================
const S = {
  user: null, campuses: [], records: [], users: [],
  view: 'loading', // loading|setup|login|dashboard|input|admin
  dashTab: 'overview', // overview|campus|grade
  filterType: 'period', // period|season
  periodStart: {y:CY, m:1}, periodEnd: {y:CY, m:CM},
  season: 'spring', seasonYear: CY,
  campusFilter: 'all', gradeFilter: '초1',
  inputCampus: '', inputYear: CY, inputMonth: CM,
  inputGrades: [],
  newInMode: 'combined', // pure|combined
  withdrawMode: 'combined',
  alert: null,
  loading: false
};

let db;
const charts = {};

// ================================================================
// UTILS
// ================================================================
async function sha256(msg) {
  const buf = new TextEncoder().encode(msg);
  const hash = await crypto.subtle.digest('SHA-256', buf);
  return Array.from(new Uint8Array(hash)).map(b=>b.toString(16).padStart(2,'0')).join('');
}

function esc(str){ return String(str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function sum(arr, fn){ return arr.reduce((s,x)=>s+(fn?fn(x):x),0); }

function yearRange(from=2023){ const yrs=[]; for(let y=CY;y>=from;y--) yrs.push(y); return yrs; }

function getSeason(m){ if([12,1,2].includes(m)) return 'winter'; if([3,4,5].includes(m)) return 'spring'; if([6,7,8].includes(m)) return 'summer'; return 'fall'; }

function getSeasonDateRange(season, year){
  // Returns [{year, month}] for the given season+year
  const months = SEASON_MONTHS[season];
  return months.map(m => ({
    year: season==='winter' && m===12 ? year : season==='winter' ? year : year,
    month: m
  }));
  // For winter Y: Dec(Y-1), Jan(Y), Feb(Y) -> year means Jan/Feb year
}

function getSeasonMonthPairs(season, year){
  if(season==='winter') return [[year-1,12],[year,1],[year,2]];
  return SEASON_MONTHS[season].map(m=>[year,m]);
}

function inFilter(r){
  if(S.filterType==='period'){
    const d=r.year*100+r.month;
    return d>=S.periodStart.y*100+S.periodStart.m && d<=S.periodEnd.y*100+S.periodEnd.m;
  } else {
    const pairs=getSeasonMonthPairs(S.season,S.seasonYear);
    return pairs.some(([y,m])=>r.year===y&&r.month===m);
  }
}

function filteredRecords(){
  let recs = S.records.filter(inFilter);
  if(S.campusFilter!=='all') recs=recs.filter(r=>r.campus===S.campusFilter);
  return recs;
}

// ── Grade aggregation for a record ──
function gradeStats(grades, mode_new='combined', mode_wd='combined'){
  return grades.map(g=>({
    grade: g.grade,
    prev: g.prev||0,
    newIn: mode_new==='pure' ? (g.newIn||0) : (g.newIn||0)+(g.transIn||0),
    pureNew: g.newIn||0,
    transIn: g.transIn||0,
    withdraw: mode_wd==='pure' ? (g.withdraw||0) : (g.withdraw||0)+(g.transOut||0)+(g.graduate||0),
    pureWd: g.withdraw||0,
    transOut: g.transOut||0,
    graduate: g.graduate||0,
    current: g.current||0,
    notes: g.notes||''
  }));
}

function recordTotals(rec){
  const gs=gradeStats(rec.grades, S.newInMode, S.withdrawMode);
  const prev=sum(gs,g=>g.prev), newIn=sum(gs,g=>g.newIn), withdraw=sum(gs,g=>g.withdraw), current=sum(gs,g=>g.current);
  const baseDenom=prev+(S.newInMode==='pure'?sum(gs,g=>g.pureNew):sum(gs,g=>g.pureNew+g.transIn));
  const wdRate=baseDenom>0?((withdraw/baseDenom)*100).toFixed(2):'0.00';
  return {prev,newIn,withdraw,current,wdRate,gs};
}

function monthKey(y,m){ return `${y}-${String(m).padStart(2,'0')}`; }
function monthLabel(k){ const [y,m]=k.split('-'); return `${y}.${m}`; }

// Aggregate all filtered records by month
function byMonth(recs){
  const map={};
  recs.forEach(r=>{
    const k=monthKey(r.year,r.month);
    if(!map[k]) map[k]={month:k,newIn:0,withdraw:0,current:0,prev:0,wdNumer:0,wdDenom:0};
    const t=recordTotals(r);
    map[k].newIn+=t.newIn; map[k].withdraw+=t.withdraw; map[k].current+=t.current; map[k].prev+=t.prev;
    // Withdrawal rate numerator/denominator for aggregated rate
    const gs=gradeStats(r.grades,'combined','combined');
    map[k].wdNumer+=sum(gs,g=>g.withdraw); map[k].wdDenom+=sum(gs,g=>g.prev+g.pureNew+g.transIn);
  });
  return Object.values(map).sort((a,b)=>a.month.localeCompare(b.month));
}

// Aggregate by campus
function byCampus(recs){
  const map={};
  recs.forEach(r=>{
    if(!map[r.campus]) map[r.campus]={campus:r.campus,newIn:0,withdraw:0,current:0,prev:0,wdNumer:0,wdDenom:0,months:0};
    const t=recordTotals(r);
    map[r.campus].newIn+=t.newIn; map[r.campus].withdraw+=t.withdraw; map[r.campus].prev+=t.prev; map[r.campus].months++;
    const gs=gradeStats(r.grades,'combined','combined');
    map[r.campus].wdNumer+=sum(gs,g=>g.withdraw); map[r.campus].wdDenom+=sum(gs,g=>g.prev+g.pureNew+g.transIn);
    // latest current
    if(!map[r.campus]._latest || r.year*100+r.month > map[r.campus]._latest)
      { map[r.campus].current=t.current; map[r.campus]._latest=r.year*100+r.month; }
  });
  return Object.values(map).map(c=>({...c, wdRate:c.wdDenom>0?((c.wdNumer/c.wdDenom)*100).toFixed(2):'0.00'}));
}

// Aggregate by grade across all records
function byGrade(recs){
  const map={};
  GRADES.forEach(g=>{ map[g]={grade:g,newIn:0,withdraw:0,current:0,prev:0,wdNumer:0,wdDenom:0}; });
  recs.forEach(r=>{
    const gs=gradeStats(r.grades,S.newInMode,S.withdrawMode);
    gs.forEach(g=>{
      if(!map[g.grade]) map[g.grade]={grade:g.grade,newIn:0,withdraw:0,current:0,prev:0,wdNumer:0,wdDenom:0};
      map[g.grade].newIn+=g.newIn; map[g.grade].withdraw+=g.withdraw; map[g.grade].prev+=g.prev;
      map[g.grade].wdNumer+=(S.withdrawMode==='pure'?g.pureWd:g.pureWd+g.transOut+g.graduate);
      map[g.grade].wdDenom+=g.prev+g.pureNew+g.transIn;
    });
    // latest current per grade
    const latestGs=gradeStats(r.grades,'combined','combined');
    latestGs.forEach(g=>{ map[g.grade].current+=g.current; });
  });
  return GRADES.map(g=>({...map[g], wdRate:map[g].wdDenom>0?((map[g].wdNumer/map[g].wdDenom)*100).toFixed(2):'0.00'}));
}

// Withdrawal rate by campus by month
function wdRateByCampusMonth(recs){
  const campusList = [...new Set(recs.map(r=>r.campus))].sort();
  const months = [...new Set(recs.map(r=>monthKey(r.year,r.month)))].sort();
  const data={};
  campusList.forEach(c=>{data[c]={};months.forEach(m=>{data[c][m]=null;});});
  recs.forEach(r=>{
    const k=monthKey(r.year,r.month);
    const gs=gradeStats(r.grades,'combined','combined');
    const numer=sum(gs,g=>g.withdraw); const denom=sum(gs,g=>g.prev+g.pureNew+g.transIn);
    data[r.campus][k]=denom>0?parseFloat(((numer/denom)*100).toFixed(2)):0;
  });
  return {campusList,months,data};
}

async function loadAllData(){
  try {
    const [uSnap,cSnap,rSnap] = await Promise.all([
      db.collection('users').get(),
      db.collection('campuses').get(),
      db.collection('records').get()
    ]);
    S.users = uSnap.docs.map(d=>({id:d.id,...d.data()}));
    S.campuses = cSnap.docs.map(d=>({id:d.id,...d.data()}));
    S.records = rSnap.docs.map(d=>({id:d.id,...d.data()}));
  } catch(e){ console.error('Load error',e); }
}

async function saveRecord(data){
  // Upsert by campus+year+month
  const existing = S.records.find(r=>r.campus===data.campus&&r.year===data.year&&r.month===data.month);
  const payload = {...data, updatedAt: Date.now(), updatedBy: S.user.displayId};
  if(existing){
    await db.collection('records').doc(existing.id).set(payload);
    S.records = S.records.map(r=>r.id===existing.id?{id:existing.id,...payload}:r);
  } else {
    const ref = await db.collection('records').add({...payload, createdAt:Date.now(), createdBy:S.user.displayId});
    S.records.push({id:ref.id,...payload});
  }
}

async function deleteRecord(id){
  await db.collection('records').doc(id).delete();
  S.records = S.records.filter(r=>r.id!==id);
}

async function saveCampus(name){
  const ref = await db.collection('campuses').add({name, createdAt:Date.now()});
  S.campuses.push({id:ref.id,name});
}

async function deleteCampus(id){
  await db.collection('campuses').doc(id).delete();
  S.campuses = S.campuses.filter(c=>c.id!==id);
}

async function createUser(displayId, password, role, campuses){
  const hash = await sha256(password);
  const data = {displayId, passwordHash:hash, role, campuses:campuses||[], active:true, createdAt:Date.now()};
  const existing = S.users.find(u=>u.displayId===displayId);
  if(existing){ await db.collection('users').doc(existing.id).set(data); S.users=S.users.map(u=>u.id===existing.id?{id:existing.id,...data}:u); }
  else { const ref=await db.collection('users').add(data); S.users.push({id:ref.id,...data}); }
}

async function deleteUser(id){
  await db.collection('users').doc(id).delete();
  S.users = S.users.filter(u=>u.id!==id);
}

async function toggleUserActive(id){
  const u = S.users.find(u=>u.id===id);
  if(!u) return;
  await db.collection('users').doc(id).update({active:!u.active});
  S.users = S.users.map(x=>x.id===id?{...x,active:!x.active}:x);
}

// ================================================================
// AUTH
// ================================================================
async function login(displayId, password){
  const hash = await sha256(password);
  const user = S.users.find(u=>u.displayId===displayId && u.passwordHash===hash && u.active!==false);
  if(!user) throw new Error('아이디 또는 비밀번호가 올바르지 않습니다.');
  S.user = user;
  saveSession(user);
  return user;
}

// ── CAMPUS TAB ──
function renderCampusView(){
  const recs = filteredRecords();
  const campusName = S.campusFilter==='all'?(S.campuses[0]?.name||'')  :S.campusFilter;
  const campRecs = recs.filter(r=>S.campusFilter==='all'?true:r.campus===campusName);
  if(!campRecs.length) return renderToggleStrip()+`<div class="empty-state"><div class="icon">🏫</div><p>선택한 캠퍼스·기간에 데이터가 없습니다.</p></div>`;

  const months=byMonth(campRecs);
  const grades=byGrade(campRecs);
  const totalNewIn=sum(months,m=>m.newIn),totalWd=sum(months,m=>m.withdraw);
  const totalCurrent=months.length?months[months.length-1].current:0;
  const wdNumer=sum(campRecs,r=>sum(gradeStats(r.grades,'combined','combined'),g=>g.withdraw));
  const wdDenom=sum(campRecs,r=>sum(gradeStats(r.grades,'combined','combined'),g=>g.prev+g.pureNew+g.transIn));
  const wdRate=wdDenom>0?((wdNumer/wdDenom)*100).toFixed(2):'0.00';

  const html=`${renderToggleStrip()}
  <div class="stats-grid">
    <div class="stat-card blue"><div class="stat-lbl">${S.newInMode==='pure'?'순수 신입':'신입 (전입포함)'}</div><div class="stat-val">${totalNewIn}</div></div>
    <div class="stat-card red"><div class="stat-lbl">${S.withdrawMode==='pure'?'순수 퇴원':'퇴원 (전출포함)'}</div><div class="stat-val">${totalWd}</div></div>
    <div class="stat-card navy"><div class="stat-lbl">현재원</div><div class="stat-val">${totalCurrent}</div></div>
    <div class="stat-card amber"><div class="stat-lbl">퇴원율</div><div class="stat-val">${wdRate}<span style="font-size:18px">%</span></div></div>
  </div>
  <div class="charts-grid">
    <div class="chart-card"><div class="chart-title">월별 신입 / 퇴원 추이</div><div class="chart-wrap"><canvas id="ch-c-trend" role="img" aria-label="캠퍼스 월별 추이"></canvas></div></div>
    <div class="chart-card"><div class="chart-title">월별 퇴원율 추이</div><div class="chart-wrap"><canvas id="ch-c-wdrate" role="img" aria-label="캠퍼스 퇴원율 추이"></canvas></div></div>
  </div>
  <div class="table-card">
    <div class="table-card-header"><span class="table-card-title">학년별 현황</span></div>
    <div class="overflow-x">
    <table class="data-table">
      <thead><tr>
        <th>학년</th>
        <th class="num">순수 신입</th><th class="num">전입</th><th class="num">신입 합계</th>
        <th class="num">순수 퇴원</th><th class="num">전출</th><th class="num">졸업</th><th class="num">퇴원 합계</th>
        <th class="num">현재원</th><th class="num">퇴원율</th>
      </tr></thead>
      <tbody>${grades.map(g=>`<tr>
        <td><strong>${g.grade}</strong></td>
        <td class="num">${g.pureNew||0}</td><td class="num">${g.transIn||0}</td>
        <td class="num"><span class="pill blue">+${g.newIn}</span></td>
        <td class="num">${g.pureWd||0}</td><td class="num">${g.transOut||0}</td><td class="num">${g.graduate||0}</td>
        <td class="num"><span class="pill dn">-${g.withdraw}</span></td>
        <td class="num">${g.current}</td>
        <td class="num">${g.wdRate}%</td>
      </tr>`).join('')}</tbody>
      <tfoot><tr>
        <td>합계</td>
        <td class="num">${sum(grades,g=>g.pureNew||0)}</td><td class="num">${sum(grades,g=>g.transIn||0)}</td>
        <td class="num">${totalNewIn}</td>
        <td class="num">${sum(grades,g=>g.pureWd||0)}</td><td class="num">${sum(grades,g=>g.transOut||0)}</td><td class="num">${sum(grades,g=>g.graduate||0)}</td>

  setTimeout(()=>{
    const wdRates=months.map(m=>{

      const n=sum(mr,r=>sum(gradeStats(r.grades,'combined','combined'),g=>g.withdraw));
      const d=sum(mr,r=>sum(gradeStats(r.grades,'combined','combined'),g=>g.prev+g.pureNew+g.transIn));
      return d>0?parseFloat(((n/d)*100).toFixed(2)):0;

    mkChart('ch-c-trend',{type:'bar',data:{labels:months.map(m=>monthLabel(m.month)),datasets:[

  },50);

}

// ── GRADE TAB ──
function renderGradeView(){
  const allRecs = S.records.filter(inFilter);
  if(!allRecs.length) return renderToggleStrip()+`<div class="empty-state"><div class="icon">📚</div><p>선택한 기간에 데이터가 없습니다.</p></div>`;

  // Per-grade totals across all campuses
  const grades=byGrade(allRecs);
  const selectedGrade = grades.find(g=>g.grade===S.gradeFilter)||grades[0];

  // Per grade, campus breakdown
  const campusGradeMap={};
  allRecs.forEach(r=>{
    if(!campusGradeMap[r.campus]) campusGradeMap[r.campus]={campus:r.campus};
    const g=gradeStats(r.grades,S.newInMode,S.withdrawMode).find(x=>x.grade===S.gradeFilter);
    if(g){
      if(!campusGradeMap[r.campus].newIn) campusGradeMap[r.campus]={campus:r.campus,newIn:0,withdraw:0,current:0,wdNumer:0,wdDenom:0};
      campusGradeMap[r.campus].newIn+=g.newIn; campusGradeMap[r.campus].withdraw+=g.withdraw;
      campusGradeMap[r.campus].current+=g.current;
      campusGradeMap[r.campus].wdNumer+=g.pureWd+g.transOut+g.graduate; campusGradeMap[r.campus].wdDenom+=g.prev+g.pureNew+g.transIn;
    }
  });
  const campusGrades=Object.values(campusGradeMap).filter(c=>c.newIn!==undefined).map(c=>({...c,wdRate:c.wdDenom>0?((c.wdNumer/c.wdDenom)*100).toFixed(2):'0.00'}));

  // Monthly trend for selected grade
  const monthGradeMap={};
  allRecs.forEach(r=>{
    const k=monthKey(r.year,r.month);
    if(!monthGradeMap[k]) monthGradeMap[k]={month:k,newIn:0,withdraw:0,wdNumer:0,wdDenom:0};
    const g=gradeStats(r.grades,S.newInMode,S.withdrawMode).find(x=>x.grade===S.gradeFilter);
    if(g){ monthGradeMap[k].newIn+=g.newIn; monthGradeMap[k].withdraw+=g.withdraw; monthGradeMap[k].wdNumer+=g.pureWd+g.transOut+g.graduate; monthGradeMap[k].wdDenom+=g.prev+g.pureNew+g.transIn; }
  });
  const monthGrade=Object.values(monthGradeMap).sort((a,b)=>a.month.localeCompare(b.month)).map(m=>({...m,wdRate:m.wdDenom>0?((m.wdNumer/m.wdDenom)*100).toFixed(2):'0.00'}));

  const html=`${renderToggleStrip()}
  <div class="stats-grid">
    <div class="stat-card blue"><div class="stat-lbl">${S.gradeFilter} 신입</div><div class="stat-val">${selectedGrade?.newIn||0}</div></div>
    <div class="stat-card red"><div class="stat-lbl">${S.gradeFilter} 퇴원</div><div class="stat-val">${selectedGrade?.withdraw||0}</div></div>
    <div class="stat-card navy"><div class="stat-lbl">${S.gradeFilter} 현재원</div><div class="stat-val">${selectedGrade?.current||0}</div></div>
    <div class="stat-card amber"><div class="stat-lbl">${S.gradeFilter} 퇴원율</div><div class="stat-val">${selectedGrade?.wdRate||'0.00'}<span style="font-size:18px">%</span></div></div>
  </div>
  <div class="charts-grid">
    <div class="chart-card"><div class="chart-title">${esc(S.gradeFilter)} 캠퍼스별 신입 / 퇴원</div><div class="chart-wrap"><canvas id="ch-g-campus" role="img" aria-label="학년별 캠퍼스 비교"></canvas></div></div>
    <div class="chart-card"><div class="chart-title">${esc(S.gradeFilter)} 월별 퇴원율 추이</div><div class="chart-wrap"><canvas id="ch-g-wdrate" role="img" aria-label="학년 퇴원율 추이"></canvas></div></div>
  </div>
  <div class="table-card">
    <div class="table-card-header"><span class="table-card-title">전 학년 비교</span></div>
    <div class="overflow-x">
    <table class="data-table">
      <thead><tr>
        <th>학년</th><th class="num">신입</th><th class="num">퇴원</th><th class="num">순증감</th><th class="num">현재원</th><th class="num">퇴원율</th>
      </tr></thead>
      <tbody>${grades.map(g=>{const net=g.newIn-g.withdraw;return`<tr style="${g.grade===S.gradeFilter?'background:var(--navy3)':''}">
        <td><strong>${g.grade}</strong></td>
        <td class="num"><span class="pill blue">+${g.newIn}</span></td>
        <td class="num"><span class="pill dn">-${g.withdraw}</span></td>
        <td class="num"><span class="pill ${net>0?'up':net<0?'dn':'neu'}">${net>0?'+':''}${net}</span></td>
        <td class="num">${g.current}</td>
        <td class="num">${g.wdRate}%</td>
      </tr>`;}).join('')}</tbody>
    </table></div>
  </div>`;

  setTimeout(()=>{
    mkChart('ch-g-campus',{type:'bar',data:{labels:campusGrades.map(c=>c.campus),datasets:[
      {label:'신입',data:campusGrades.map(c=>c.newIn),backgroundColor:'rgba(41,128,185,.8)',borderRadius:4},
      {label:'퇴원',data:campusGrades.map(c=>c.withdraw),backgroundColor:'rgba(192,57,43,.8)',borderRadius:4}
    ]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'top'}},scales:{y:{beginAtZero:true}}}});
    mkChart('ch-g-wdrate',{type:'line',data:{labels:monthGrade.map(m=>monthLabel(m.month)),datasets:[
      {label:'퇴원율',data:monthGrade.map(m=>parseFloat(m.wdRate)),borderColor:'#c0392b',backgroundColor:'rgba(192,57,43,.1)',fill:true,borderWidth:2,pointRadius:4,tension:.3}
    ]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'top'}},scales:{x:{ticks:{maxRotation:45,font:{size:11}}},y:{beginAtZero:true,ticks:{callback:v=>`${v}%`}}}}});
  },50);
  return html;
}

      </tr></thead>
      <tbody>${g.map((row,i)=>`<tr>
        <td>${esc(row.grade)}</td>
        <td><input type="number" class="input-xs" value="${row.prev||0}" min="0" onchange="updateGradeField(${i},'prev',this.value)"></td>
        <td><input type="number" class="input-xs" value="${row.newIn||0}" min="0" onchange="updateGradeField(${i},'newIn',this.value)"></td>
        <td><input type="number" class="input-xs" value="${row.transIn||0}" min="0" onchange="updateGradeField(${i},'transIn',this.value)"></td>
        <td><input type="number" class="input-xs" value="${row.withdraw||0}" min="0" onchange="updateGradeField(${i},'withdraw',this.value)"></td>
        <td><input type="number" class="input-xs" value="${row.transOut||0}" min="0" onchange="updateGradeField(${i},'transOut',this.value)"></td>
        <td><input type="number" class="input-xs" value="${row.graduate||0}" min="0" onchange="updateGradeField(${i},'graduate',this.value)"></td>
        <td class="calc">${calcGradeCurrent(row)}</td>
        <td><input type="text" style="width:120px;padding:4px 6px;border:1px solid var(--border);border-radius:4px;font-size:12px" value="${esc(row.notes||'')}" onchange="updateGradeField(${i},'notes',this.value)"></td>

        <td>${totals.prev}</td><td>${totals.newIn}</td><td>${totals.transIn}</td>

    <button class="btn btn-primary" onclick="doSaveRecord()">저장</button>
  </div>`;
}

function calcGradeCurrent(g){
  return Math.max(0,(g.prev||0)+(g.newIn||0)+(g.transIn||0)-(g.withdraw||0)-(g.transOut||0)-(g.graduate||0));
}

function initInputGrades(existingRecord){
  if(existingRecord){
    S.inputGrades = GRADES.map(gr=>{
      const eg=existingRecord.grades.find(x=>x.grade===gr);
      return eg||{grade:gr,prev:0,newIn:0,transIn:0,withdraw:0,transOut:0,graduate:0,notes:''};
    });
  } else {
    S.inputGrades = GRADES.map(g=>({grade:g,prev:0,newIn:0,transIn:0,withdraw:0,transOut:0,graduate:0,notes:''}));
  }
}

function setDashTab(tab){ S.dashTab=tab; renderCurrentView(); }

function setPeriod(key,val){
  if(key==='sy') S.periodStart.y=+val;
  else if(key==='sm') S.periodStart.m=+val;
  else if(key==='ey') S.periodEnd.y=+val;

function setGradeFilter(v){ S.gradeFilter=v; renderCurrentView(); }

function setInputField(field,val){
  if(field==='campus') S.inputCampus=val;
  else if(field==='year') S.inputYear=+val;
  else if(field==='month') S.inputMonth=+val;
  // Don't re-render to avoid losing input focus
}

function loadExistingInput(){
  const existing=S.records.find(r=>r.campus===S.inputCampus&&r.year===S.inputYear&&r.month===S.inputMonth);
  initInputGrades(existing);
  renderCurrentView();
}

function updateGradeField(i,field,val){
  if(field==='notes') S.inputGrades[i].notes=val;
  else S.inputGrades[i][field]=parseInt(val)||0;
  // Update current cell only
  const rows=document.querySelectorAll('.grade-entry-table tbody tr');
  if(rows[i]){
    const calcTd=rows[i].querySelector('.calc');
    if(calcTd) calcTd.textContent=calcGradeCurrent(S.inputGrades[i]);
  }
  // Update totals
  const tf=document.querySelector('.grade-entry-table tfoot tr');
  if(tf){
    const g=S.inputGrades;
    const cells=tf.querySelectorAll('td');
    if(cells[1]) cells[1].textContent=sum(g,x=>x.prev||0);
    if(cells[2]) cells[2].textContent=sum(g,x=>x.newIn||0);
    if(cells[3]) cells[3].textContent=sum(g,x=>x.transIn||0);
    if(cells[4]) cells[4].textContent=sum(g,x=>x.withdraw||0);
    if(cells[5]) cells[5].textContent=sum(g,x=>x.transOut||0);
    if(cells[6]) cells[6].textContent=sum(g,x=>x.graduate||0);
    if(cells[7]) cells[7].textContent=sum(g,x=>calcGradeCurrent(x));
  }
}

async function doSaveRecord(){
  if(!S.inputCampus){alert('캠퍼스를 선택해주세요');return;}
  try{
    const grades=S.inputGrades.map(g=>({...g,current:calcGradeCurrent(g)}));
    await saveRecord({campus:S.inputCampus,year:S.inputYear,month:S.inputMonth,quarter:Math.ceil(S.inputMonth/3),grades});
    setAlert(`${S.inputCampus} ${S.inputYear}년 ${S.inputMonth}월 데이터가 저장되었습니다.`,'success');
    S.view='dashboard';
    renderCurrentView();

// 엑셀 파일 파싱
// 양식 구조:
//   Row 0: 빈 행
//   Row 1 (header): '', 캠퍼스, 년도, 분기, 월, 학년, 전월마감원, 신입, 전입, 퇴원, 전출, 졸업, 현재원, 기타 특이 사항
//   Rows 2~10: 초1~중3 데이터 행
function parseExcelData(workbook){
  const sheetName = workbook.SheetNames[0];
  const ws = workbook.Sheets[sheetName];
  const rows = XLSX.utils.sheet_to_json(ws, {header:1, defval:'', raw:false});

  // 캠퍼스/년도/월은 B~E 열(index 1~4), 병합셀 고려하여 비어있지 않은 첫 번째 값 사용
  const dataRows = rows.slice(2, 11); // 초1~중3 (9개 행)
  if(dataRows.length < 1) throw new Error('데이터 행을 찾을 수 없습니다. (초1~중3 행 필요)');

  const firstVal=(colIdx)=>{
    for(const r of dataRows){ const v=String(r[colIdx]||'').trim(); if(v) return v; }
    return '';
  };

  const campusName = firstVal(1);
  const yearStr    = firstVal(2);
  const monthStr   = firstVal(4);

  if(!campusName) throw new Error('캠퍼스명이 비어 있습니다. (B열 확인)');
  if(!yearStr)    throw new Error('년도가 비어 있습니다. (C열 확인)');
  if(!monthStr)   throw new Error('월이 비어 있습니다. (E열 확인)');

  const year  = parseInt(yearStr);
  const month = parseInt(monthStr);
  if(isNaN(year)||isNaN(month)) throw new Error(`년도/월 형식 오류: 년도=${yearStr}, 월=${monthStr}`);

  const grades = dataRows.map((row, i)=>{
    const grade = String(row[5]||GRADES[i]||'').trim();
    const p=(n)=>{ const v=parseInt(String(row[n]||'').replace(/[^0-9-]/g,'')); return isNaN(v)?0:Math.max(0,v); };
    const prev=p(6), newIn=p(7), transIn=p(8), withdraw=p(9), transOut=p(10), graduate=p(11);
    const excelCurrent=p(12);
    const calcedCurrent=Math.max(0,prev+newIn+transIn-withdraw-transOut-graduate);
    return { grade, prev, newIn, transIn, withdraw, transOut, graduate,
      current: excelCurrent||calcedCurrent, notes: String(row[13]||'').trim() };
  });

  return { campusName, year, month, quarter: Math.ceil(month/3), grades };
}

function applyParsedData(parsed){
  const { campusName, year, month, quarter, grades } = parsed;

  // 캠퍼스 매칭 (완전일치 우선, 없으면 유사 매칭)
  const matchedCampus = S.campuses.find(c=>c.name===campusName)
    || S.campuses.find(c=>campusName.includes(c.name)||c.name.includes(campusName));

  if(!matchedCampus){
    throw new Error(`캠퍼스 '${campusName}'을(를) 시스템에서 찾을 수 없습니다.\n관리자에서 먼저 캠퍼스를 등록해 주세요.`);
  }

  S.inputCampus = matchedCampus.name;
  S.inputYear   = year;
  S.inputMonth  = month;
  S.inputGrades = GRADES.map(g=>{
    const found = grades.find(x=>x.grade===g);
    return found || {grade:g,prev:0,newIn:0,transIn:0,withdraw:0,transOut:0,graduate:0,notes:''};
  });
}

function handleExcelUpload(file){
  if(!file) return;
  const statusEl = document.getElementById('upload-status');
  if(!statusEl) return;

  if(!file.name.match(/\.(xlsx|xls)$/i)){
    statusEl.innerHTML=`<div class="upload-err">⚠️ .xlsx 또는 .xls 파일만 지원합니다.</div>`;
    return;
  }

  const reader = new FileReader();
  reader.onload = (e)=>{
    try{
      const data = new Uint8Array(e.target.result);
      const wb   = XLSX.read(data, {type:'array', cellDates:false});
      const parsed = parseExcelData(wb);
      applyParsedData(parsed);

      // 성공 메시지 표시 후 폼 재렌더
      const existing = S.records.find(r=>r.campus===parsed.campusName&&r.year===parsed.year&&r.month===parsed.month);
      statusEl.innerHTML=`<div class="upload-result">
        <div class="icon">✅</div>
        <div class="info">
          <strong>${esc(parsed.campusName)} ${parsed.year}년 ${parsed.month}월 데이터를 읽었습니다.</strong>
          <span>${existing?'⚠️ 기존 데이터가 있습니다. 저장하면 덮어씁니다.':'신규 데이터입니다.'} · 아래 내용을 확인 후 저장하세요.</span>
        </div>
      </div>`;
      // 폼 테이블만 업데이트
      renderCurrentView();
      // 업로드 성공 메시지 다시 표시 (렌더 후)
      const s2=document.getElementById('upload-status');
      if(s2) s2.innerHTML=`<div class="upload-result">
        <div class="icon">✅</div>
        <div class="info">
          <strong>${esc(parsed.campusName)} ${parsed.year}년 ${parsed.month}월 데이터 읽기 완료</strong>
          <span>${existing?'⚠️ 기존 데이터 덮어쓰기 예정':'신규 데이터'} · 학년별 내용 확인 후 저장하세요.</span>
        </div>
      </div>`;
    }catch(err){
      statusEl.innerHTML=`<div class="upload-err">❌ 파싱 오류: ${esc(err.message)}</div>`;
    }
  };
  reader.onerror = ()=>{ statusEl.innerHTML=`<div class="upload-err">❌ 파일을 읽을 수 없습니다.</div>`; };
  reader.readAsArrayBuffer(file);
}

function handleExcelDrop(event){
  event.preventDefault();
  document.getElementById('upload-zone')?.classList.remove('drag-over');
  const file = event.dataTransfer?.files?.[0];
  if(file) handleExcelUpload(file);
}

// 양식 다운로드 — 업로드된 원본 양식과 동일한 구조
// 캠퍼스·년도·분기·월 병합셀 + 학년 9행
function downloadTemplate(prefill=false){
  if(typeof XLSX==='undefined'){ alert('SheetJS 라이브러리가 로드되지 않았습니다.'); return; }

  const campus  = prefill && S.inputCampus ? S.inputCampus : '';
  const yr      = prefill ? S.inputYear  : '';
  const mo      = prefill ? S.inputMonth : '';
  const qr      = (mo&&yr) ? Math.ceil(mo/3) : '';
  const fname   = campus ? `마감양식_${campus}_${yr}년${String(mo).padStart(2,'0')}월.xlsx` : '마감양식_기본_.xlsx';

  // AOA: row0=blank, row1=header, rows2-10=data
  const aoa = [
    Array(14).fill(''),  // row 0 (1행: 빈 행)
    ['','캠퍼스','년도','분기','월','학년','전월마감원','신입','전입','퇴원','전출','졸업','현재원','기타 특이 사항'],
    ...GRADES.map((g,i)=>[
      '',
      i===0 ? campus : '',   // B열: 캠퍼스 (첫 행만, 나머지는 병합)
      i===0 ? yr     : '',   // C열: 년도
      i===0 ? qr     : '',   // D열: 분기
      i===0 ? mo     : '',   // E열: 월
      g,                     // F열: 학년
      '','','','','','','','' // G-N: 입력 셀
    ])
  ];

  const ws = XLSX.utils.aoa_to_sheet(aoa);

  // 병합셀: 캠퍼스(B3:B11), 년도(C3:C11), 분기(D3:D11), 월(E3:E11)
  // 0-indexed: row2~10, col 1~4
  ws['!merges'] = [
    {s:{r:2,c:1}, e:{r:10,c:1}},
    {s:{r:2,c:2}, e:{r:10,c:2}},
    {s:{r:2,c:3}, e:{r:10,c:3}},
    {s:{r:2,c:4}, e:{r:10,c:4}},
  ];

  // 열 너비
  ws['!cols'] = [
    {wch:3},{wch:14},{wch:8},{wch:6},{wch:6},{wch:8},
    {wch:12},{wch:8},{wch:8},{wch:8},{wch:8},{wch:8},{wch:10},{wch:22}
  ];

  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'Sheet1');
  XLSX.writeFile(wb, fname);
}

// 헤더의 양식 다운로드 버튼 → 빈 양식
// 데이터 입력 페이지의 다운로드 버튼 → 현재 캠퍼스/기간 prefill
function downloadBlankTemplate(){ downloadTemplate(false); }
function downloadPrefillTemplate(){ downloadTemplate(true); }

async function reloadData(){
  try{
    const [cSnap,rSnap]=await Promise.all([
      db.collection('campuses').get(),
      db.collection('records').get()
    ]);
    S.campuses=cSnap.docs.map(d=>({id:d.id,...d.data()}));
    S.records=rSnap.docs.map(d=>({id:d.id,...d.data()}));
    setAlert(`✅ 새로고침 완료 — 캠퍼스 ${S.campuses.length}개, 데이터 ${S.records.length}건`,'success');

  }
}

// ================================================================
// INIT
// ================================================================
async function init(){
  try{
    firebase.initializeApp(FIREBASE_CONFIG);
    db = firebase.firestore();
  }catch(e){ console.error('Firebase init error',e); }

  // Check session
  const session=getSession();
  try{
    // Load users first to validate session & check first-run
    const uSnap=await db.collection('users').get();
    S.users=uSnap.docs.map(d=>({id:d.id,...d.data()}));

    if(S.users.length===0){
      S.view='setup'; renderCurrentView(); return;
    }
    if(session && S.users.find(u=>u.displayId===session.displayId&&u.passwordHash===session.passwordHash&&u.active!==false)){
      S.user=session;
      try{
        const [cSnap,rSnap]=await Promise.all([
          db.collection('campuses').get(),
          db.collection('records').get()
        ]);
        S.campuses=cSnap.docs.map(d=>({id:d.id,...d.data()}));
        S.records=rSnap.docs.map(d=>({id:d.id,...d.data()}));
        console.log('Loaded campuses:',S.campuses.length,'records:',S.records.length);
      }catch(loadErr){
        console.error('Data load error:',loadErr);
        alert('데이터 로드 실패: '+loadErr.message);
      }
      S.view='dashboard';
    } else {
      clearSession();
      S.view='login';
    }
  }catch(e){
    console.error('Init error',e);
    S.view='login';
  }
  renderCurrentView();
}

init();
